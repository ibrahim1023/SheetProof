name: Evals

on:
  pull_request:
  push:
    branches: [main]

jobs:
  explain-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run tests
        run: pytest -q
      - name: Run explanation schema eval gate
        run: sheetproof eval-explain --min-pass-rate 0.4
      - name: Run reliability metrics gate
        run: sheetproof reliability-report --min-pass-rate 0.4 --min-refusal-rate 0.5
      - name: Run promptfoo eval gate
        run: npx promptfoo@latest eval -c evals/promptfooconfig.yaml
      - name: Run audit benchmark regression gate
        run: |
          sheetproof benchmark-audit \
            --workbook examples/benchmark_small.xlsx \
            --runs 3 \
            --baseline evals/results/audit_benchmark_small_baseline.json \
            --max-regression-pct 100
          sheetproof benchmark-audit \
            --workbook examples/benchmark_medium.xlsx \
            --runs 3 \
            --baseline evals/results/audit_benchmark_medium_baseline.json \
            --max-regression-pct 120
          sheetproof benchmark-audit \
            --workbook examples/benchmark_large.xlsx \
            --runs 2 \
            --baseline evals/results/audit_benchmark_large_baseline.json \
            --max-regression-pct 150
