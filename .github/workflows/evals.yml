name: Evals

on:
  pull_request:
  push:
    branches: [main]

jobs:
  explain-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run tests
        run: pytest -q
      - name: Run explanation schema eval gate
        run: sheetproof eval-explain --min-pass-rate 0.5
